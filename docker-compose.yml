services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-LinTalk}
      MYSQL_USER: ${MYSQL_USER:-lintalk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lintalk123}
    command: [ "mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci" ]
    volumes:
      - lintalk-mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - lintalk-net

  lintalk-server:
    image: node:20
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules/express ] || [ ! -d node_modules/mysql2 ] || [ ! -d node_modules/ws ]; then npm install --no-audit --no-fund; fi; npm run start"
    env_file:
      - ./.env
    volumes:
      - ./LinTalk-server:/app
      - lintalk-server-node-modules:/app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      HTTP_PORT: ${HTTP_PORT:-9200}
      WS_PORT: ${WS_PORT:-9100}
      DB_CLIENT: ${DB_CLIENT:-mysql}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-LinTalk}
      MYSQL_USER: ${MYSQL_USER:-lintalk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lintalk123}
    ports:
      - "${HTTP_PORT:-9200}:${HTTP_PORT:-9200}"
      - "${WS_PORT:-9100}:${WS_PORT:-9100}"
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://127.0.0.1:' + (process.env.HTTP_PORT || 9200) + '/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lintalk-net

  lintalk-web:
    image: node:20
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules/vite ]; then npm install --no-audit --no-fund; fi; npm run build && echo 'Build Complete' && tail -f /dev/null"
    environment:
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      VITE_HTTP_URL: ${VITE_HTTP_URL:-http://109.244.63.124:18080}
      VITE_WS_URL: ${VITE_WS_URL:-ws://109.244.63.124:18080}
      VITE_LINYU_VERSION: ${VITE_LINYU_VERSION:-1.1.3}
    volumes:
      - ./LinTalk-web:/app
      - lintalk-web-node-modules:/app/node_modules
    depends_on:
      - lintalk-server
    restart: unless-stopped
    networks:
      - lintalk-net

  nginx:
    image: nginx:alpine
    volumes:
      - ./LinTalk-server/https/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./LinTalk-web/dist:/usr/share/nginx/html:ro
    ports:
      - "18080:18080"
    depends_on:
      - lintalk-web
      - lintalk-server
    restart: unless-stopped
    networks:
      - lintalk-net

networks:
  lintalk-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  lintalk-mysql-data:
  lintalk-server-node-modules:
  lintalk-web-node-modules:
